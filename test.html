<!DOCTYPE html>
<html>
<head>
    <title>اختبار الفيديوهات</title>
</head>
<body>
    <h1>اختبار: هل الملف يشتغل؟</h1>
    <div id="result"></div>

    <script>
        fetch('https://raw.githubusercontent.com/ndjdjw/Kkkkkkk/main/data/videos.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('result').innerHTML = `
                    <p style="color:green;">✅ تم تحميل ${data.videos.length} فيديو</p>
                    <p>أول فيديو: ${data.videos[0].title}</p>
                    <a href="https://youtube.com/watch?v=${data.videos[0].videoId}" target="_blank">مشاهدة</a>
                `;
            })
            .catch(err => {
                document.getElementById('result').innerHTML = `<p style="color:red;">❌ خطأ: ${err.message}</p>`;
            });
    </script>
</body>
</html>
