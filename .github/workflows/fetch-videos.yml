name: جلب فيديوهات من قناة Mosh

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  fetch-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: استيراد المستودع
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - name: إنشاء مجلد البيانات
        run: mkdir -p data
      
      - name: جلب الفيديوهات من RSS
        run: |
          # رابط RSS لقناة Mosh
          RSS_URL="https://www.youtube.com/feeds/videos.xml?channel_id=UCWv7vMbMWH4-V0ZXdmDpPBA"
          
          echo "جلب آخر فيديوهات Programming with Mosh..."
          
          # جلب RSS
          curl -s "$RSS_URL" > feed.xml
          
          # استخراج ids
          grep -oP '(?<=<yt:videoId>).*?(?=</yt:videoId>)' feed.xml > ids.txt
          
          # استخراج العناوين (تجاهل أول عنوان لأنه اسم القناة)
          grep -oP '(?<=<title>).*?(?=</title>)' feed.xml | tail -n +2 > titles.txt
          
          # بداية ملف JSON
          echo '{"videos": [' > data/videos.json
          
          # دمج البيانات
          paste ids.txt titles.txt | while read id title; do
            cat >> data/videos.json << EOF
            {
              "videoId": "$id",
              "title": "$title",
              "channel": "Programming with Mosh",
              "thumbnails": {
                "medium": {
                  "url": "https://i.ytimg.com/vi/$id/mqdefault.jpg"
                }
              }
            },
EOF
          done
          
          # إزالة آخر فاصلة
          sed -i '$ s/,$//' data/videos.json
          echo ']}' >> data/videos.json
          
          # تنظيف
          rm -f feed.xml ids.txt titles.txt
          
          echo "✅ تم جلب الفيديوهات"
      
      - name: حفظ التغييرات
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/videos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث الفيديوهات $(date)"
          git push
