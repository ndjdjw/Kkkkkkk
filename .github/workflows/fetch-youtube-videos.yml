name: جلب فيديوهات يوتيوب

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  fetch-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: استيراد المستودع
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - name: إنشاء مجلد البيانات
        run: mkdir -p data
      
      - name: جلب فيديوهات اختبارية
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          # كلمة بحث واحدة بسيطة للتجربة
          QUERY="Python programming"
          
          echo "🔍 جلب فيديوهات عن: $QUERY"
          
          # استدعاء API مع عرض التفاصيل
          curl -v "https://www.googleapis.com/youtube/v3/search?part=snippet&q=$QUERY&type=video&videoLicense=creativeCommon&maxResults=5&key=$YOUTUBE_API_KEY" > response.json 2>&1
          
          # عرض الرد
          cat response.json
          
          # حفظ النتائج
          echo '{"videos": []}' > data/videos.json
          
          echo "✅ تم"
      
      - name: رفع الملفات
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/videos.json
          git commit -m "تحديث" || echo "لا تغييرات"
          git push
