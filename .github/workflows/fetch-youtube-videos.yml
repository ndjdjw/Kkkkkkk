name: Fetch YouTube Videos

on:
  workflow_dispatch:  # يشتغل يدوياً
  schedule:
    - cron: '0 */6 * * *'  # كل 6 ساعات

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Fetch videos from YouTube
        env:
          API_KEY: ${{ secrets.YOUTUBE_API_KEY }}  # 🔥 هنا يسحب المفتاح السري
        run: |
          # إنشاء مجلد البيانات
          mkdir -p data
          
          # البحث عن فيديوهات CC
          curl -s "https://www.googleapis.com/youtube/v3/search?part=snippet&q=تفسير+قرآن&type=video&videoLicense=creativeCommon&maxResults=20&key=$API_KEY" > data/videos.json
          
          # عرض رسالة نجاح
          echo "✅ تم تحديث الفيديوهات في $(date)"
      
      - name: Commit and push if changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث تلقائي للفيديوهات"
          git push
