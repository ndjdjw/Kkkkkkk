name: جلب فيديوهات يوتيوب (المشاع الإبداعي)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  fetch-and-save:
    name: جلب الفيديوهات وحفظها
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: استيراد المستودع
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: إنشاء مجلد البيانات
        run: mkdir -p data  # 🔥 هذا السطر مهم جداً

      - name: جلب الفيديوهات من يوتيوب
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          # قائمة كلمات البحث
          QUERIES=("تفسير قرآن" "حديث نبوي" "فقه إسلامي" "عقيدة إسلامية" "سيرة نبوية")
          
          # ملف مؤقت لتجميع النتائج
          echo "" > videos_list.json
          
          for QUERY in "${QUERIES[@]}"; do
            echo "🔍 البحث عن: $QUERY"
            
            # استدعاء YouTube API
            curl -s "https://www.googleapis.com/youtube/v3/search?part=snippet&q=$QUERY&type=video&videoLicense=creativeCommon&maxResults=10&key=$YOUTUBE_API_KEY" \
              | jq '.items[] | {query: "'"$QUERY"'", videoId: .id.videoId, title: .snippet.title, channel: .snippet.channelTitle, publishedAt: .snippet.publishedAt, thumbnails: .snippet.thumbnails}' \
              >> videos_list.json
              
            # إضافة فاصلة بين العناصر (باستثناء آخر عنصر)
            echo "," >> videos_list.json
          done
          
          # بداية ملف JSON
          echo '{"videos": [' > data/videos.json
          
          # إزالة آخر فاصلة من الملف المؤقت
          sed '$ s/,$//' videos_list.json >> data/videos.json
          
          # نهاية ملف JSON
          echo ']}' >> data/videos.json
          
          # تنظيف الملفات المؤقتة
          rm -f videos_list.json
          
          # عرض النتيجة
          if [ -f data/videos.json ]; then
            COUNT=$(jq '.videos | length' data/videos.json)
            echo "✅ تم جلب $COUNT فيديو إجمالاً"
          else
            echo "❌ فشل إنشاء ملف الفيديوهات"
            exit 1
          fi

      - name: حفظ التغييرات في المستودع
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git add data/videos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 تحديث تلقائي لقائمة فيديوهات CC - $(date)"
          git push
