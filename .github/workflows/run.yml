name: جلب جميع فيديوهات Mosh

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  fetch-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: تثبيت yt-dlp
        run: |
          sudo apt update
          sudo apt install -y python3-pip
          pip install yt-dlp

      - name: جلب جميع الفيديوهات من القناة
        run: |
          mkdir -p data
          
          # جلب كل الفيديوهات المتاحة (yt-dlp يجلب أكبر عدد ممكن)
          yt-dlp --flat-playlist --dump-json --playlist-end 300 "https://www.youtube.com/@programmingwithmosh" 2>/dev/null | jq -s '.' > raw.json
          
          # تحويل البيانات إلى الصيغة المطلوبة
          jq '
            {
              videos: [
                .[] | {
                  videoId: .id,
                  title: .title,
                  channel: "Programming with Mosh",
                  thumbnails: {
                    medium: {
                      url: "https://i.ytimg.com/vi/\(.id)/mqdefault.jpg"
                    }
                  }
                }
              ]
            }
          ' raw.json > data/videos.json
          
          # عد الفيديوهات
          COUNT=$(jq '.videos | length' data/videos.json)
          echo "✅ تم جلب $COUNT فيديو من القناة"
          
          # تنظيف
          rm raw.json

      - name: حفظ التغييرات
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/videos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🔥 تحديث جميع الفيديوهات $(date)"
          git push
