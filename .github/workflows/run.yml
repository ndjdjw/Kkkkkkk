name: جلب فيديوهات يوتيوب

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p data
          echo '{"videos": []}' > data/videos.json
          curl -s "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.youtube.com%2Ffeeds%2Fvideos.xml%3Fchannel_id%3DUCWv7vMbMWH4-V0ZXdmDpPBA" | jq '.items' | jq 'map({videoId: .guid, title: .title, channel: "Programming with Mosh", thumbnails: {medium: {url: (.thumbnail)}}})' > data/videos.json
      - run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git add data/videos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث الفيديوهات"
          git push
