name: جلب فيديوهات Mosh

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - name: إنشاء مجلد البيانات
        run: mkdir -p data
      
      - name: جلب الفيديوهات
        run: |
          echo "جلب الفيديوهات من قناة Mosh..."
          
          # جلب RSS
          curl -s "https://www.youtube.com/feeds/videos.xml?channel_id=UCWv7vMbMWH4-V0ZXdmDpPBA" > feed.xml
          
          # استخراج ids
          grep -oP '(?<=<yt:videoId>).*?(?=</yt:videoId>)' feed.xml > ids.txt
          
          # بداية ملف JSON
          echo '{"videos": [' > data/videos.json
          
          # قراءة ids وبناء JSON
          while read id; do
            if [ ! -z "$id" ]; then
              cat >> data/videos.json <<EOF
              {
                "videoId": "$id",
                "title": "فيديو من قناة Mosh",
                "channel": "Programming with Mosh",
                "thumbnails": {
                  "medium": {
                    "url": "https://i.ytimg.com/vi/$id/mqdefault.jpg"
                  }
                }
              },
EOF
            fi
          done < ids.txt
          
          # إزالة آخر فاصلة
          sed -i '$ s/,$//' data/videos.json
          echo ']}' >> data/videos.json
          
          # تنظيف
          rm -f feed.xml ids.txt
          
          echo "✅ تم جلب الفيديوهات"
      
      - name: حفظ التغييرات
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/videos.json
          git commit -m "تحديث الفيديوهات" || echo "لا تغييرات"
          git push
