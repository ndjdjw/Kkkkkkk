name: جلب فيديوهات حلال (أعلى المجالات طلباً)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  fetch-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: تثبيت yt-dlp
        run: |
          sudo apt update
          sudo apt install -y python3-pip
          pip install yt-dlp

      - name: جلب فيديوهات من قنوات تعليمية موثوقة
        run: |
          mkdir -p data
          
          # قائمة قنوات يوتيوب موثوقة (تعليمية بحتة، خالية من المحظورات)
          CHANNELS=(
            "freecodecamp"                    # freeCodeCamp (إنجليزي)
            "ProgrammingwithMosh"             # برمجة نظيف
            "CoreyMSchafer"                    # Corey Schafer (برمجة)
            "thenewboston"                      # thenewboston (برمجة)
            "عبدالرحمن الدوسري"                # قناة عربية للذكاء الاصطناعي
            "محمد مشالي"                        # برمجة عربية
            "إسلام ممدوح"                       # تسويق إلكتروني عربي
            "دحيح"                               # محتوى علمي ثقافي
            "أكاديمية حسوب"                     # محتوى تقني عربي
          )

          # ملف مؤقت
          echo '[]' > temp.json

          for CHANNEL in "${CHANNELS[@]}"; do
            echo "🔍 جلب فيديوهات من قناة: $CHANNEL"
            # جلب آخر 20 فيديو من القناة (مع تجاهل الأخطاء)
            yt-dlp "ytsearch20:${CHANNEL}" --dump-json --flat-playlist 2>/dev/null | \
              jq -c '{videoId: .id, title: .title, channel: (.channel // .uploader // $CHANNEL), thumbnails: {medium: {url: ("https://i.ytimg.com/vi/\(.id)/mqdefault.jpg")}}}' --arg CHANNEL "$CHANNEL" >> temp.json
            echo "" >> temp.json
          done

          # تنظيف البيانات وإزالة التكرارات
          jq -s '
            {
              videos: [
                .[] | {
                  videoId,
                  title,
                  channel,
                  thumbnails
                }
              ] | unique_by(.videoId)
            }
          ' temp.json > data/videos.json

          rm temp.json
          
          COUNT=$(jq '.videos | length' data/videos.json)
          echo "✅ تم جلب ${COUNT} فيديو حلال"

      - name: حفظ التغييرات
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/videos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🔥 تحديث مكتبة الفيديوهات $(date)"
          git push
