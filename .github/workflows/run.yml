name: جلب فيديوهات Python (freeCodeCamp)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # يتحدث كل 6 ساعات

jobs:
  fetch-python:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: إعداد الأدوات
        run: |
          sudo apt update
          sudo apt install -y python3-pip jq
          pip install yt-dlp

      - name: جلب آخر 50 فيديو Python من freeCodeCamp
        run: |
          mkdir -p data
          # جلب الفيديوهات من قناة freeCodeCamp (غنية بدروس Python)
          yt-dlp --flat-playlist --dump-json --playlist-end 50 "https://www.youtube.com/@freecodecamp" 2>/dev/null | jq -s '.' > raw.json

          # فلترة الفيديوهات التي تحتوي على "Python" في عنوانها (لضمان الدقة)
          jq '
            [
              .[] | select(.title | contains("Python"))
            ] | {
              videos: [
                .[] | {
                  videoId: .id,
                  title: .title,
                  channel: "freeCodeCamp",
                  thumbnails: {
                    medium: {
                      url: "https://i.ytimg.com/vi/\(.id)/mqdefault.jpg"
                    }
                  }
                }
              ]
            }
          ' raw.json > data/videos.json

          rm raw.json
          echo "✅ تم جلب $(jq '.videos | length' data/videos.json) فيديو عن Python"

      - name: حفظ التغييرات
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/videos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث فيديوهات Python $(date)"
          git push
