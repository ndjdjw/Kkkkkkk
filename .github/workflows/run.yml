name: جلب فيديوهات RSS

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: جلب RSS وتخزينه
        run: |
          mkdir -p data
          curl -s "https://www.youtube.com/feeds/videos.xml?channel_id=UCWv7vMbMWH4-V0ZXdmDpPBA" > feed.xml

      - name: تحويل RSS إلى JSON (بدون تعقيد)
        run: |
          # بدء ملف JSON
          echo '{"videos": []}' > data/videos.json

          # استخراج الـ videoId والعنوان باستخدام grep بسيط
          grep -oP '(?<=<yt:videoId>).*?(?=</yt:videoId>)' feed.xml > ids.txt
          grep -oP '(?<=<title>).*?(?=</title>)' feed.xml | tail -n +2 > titles.txt

          # دمج الملفين
          paste ids.txt titles.txt | while read id title; do
            # إضافة الفيديو إلى JSON
            jq --arg id "$id" --arg title "$title" \
               '.videos += [{
                 "videoId": $id,
                 "title": $title,
                 "channel": "Programming with Mosh",
                 "thumbnails": {
                   "medium": {
                     "url": "https://i.ytimg.com/vi/\($id)/mqdefault.jpg"
                   }
                 }
               }]' data/videos.json > temp.json && mv temp.json data/videos.json
          done

          echo "تم جلب $(jq '.videos | length' data/videos.json) فيديو"

      - name: حفظ التغييرات
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/videos.json
          git commit -m "تحديث الفيديوهات $(date)" || echo "لا تغييرات"
          git push
