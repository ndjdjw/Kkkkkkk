name: جلب فيديوهات يوتيوب عبر RSS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - name: إنشاء مجلد البيانات
        run: mkdir -p data
      
      - name: جلب وتحويل RSS
        run: |
          RSS_URL="https://www.youtube.com/feeds/videos.xml?channel_id=UCWv7vMbMWH4-V0ZXdmDpPBA"
          
          # جلب RSS وحفظه كملف مؤقت
          curl -s "$RSS_URL" > feed.xml
          
          # بداية ملف JSON
          echo '{"videos": []}' > data/videos.json
          
          # استخراج البيانات وتنسيقها
          grep -oP '(?<=<entry>).*?(?=</entry>)' feed.xml | while read -r entry; do
            videoId=$(echo "$entry" | grep -oP '(?<=<yt:videoId>).*?(?=</yt:videoId>)')
            title=$(echo "$entry" | grep -oP '(?<=<title>).*?(?=</title>)')
            published=$(echo "$entry" | grep -oP '(?<=<published>).*?(?=</published>)')
            
            if [ -n "$videoId" ] && [ -n "$title" ]; then
              jq --arg id "$videoId" \
                 --arg title "$title" \
                 --arg published "$published" \
                 '.videos += [{
                   "videoId": $id,
                   "title": $title,
                   "published": $published,
                   "channel": "Programming with Mosh",
                   "thumbnails": {
                     "medium": {
                       "url": ("https://i.ytimg.com/vi/\($id)/mqdefault.jpg")
                     }
                   }
                 }]' data/videos.json > tmp.json && mv tmp.json data/videos.json
            fi
          done
          
          echo "✅ تم جلب $(jq '.videos | length' data/videos.json) فيديو"
      
      - name: حفظ التغييرات
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add data/videos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث الفيديوهات"
          git push
