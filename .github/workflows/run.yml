name: جلب 200 فيديو من Mosh

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: إعداد yt-dlp
        run: |
          sudo apt update
          sudo apt install -y python3-pip
          pip install yt-dlp

      - name: جلب 200 فيديو
        run: |
          mkdir -p data
          yt-dlp --flat-playlist --dump-json --playlist-end 200 "https://www.youtube.com/@programmingwithmosh" 2>/dev/null | jq -s '.' > raw.json
          jq '
            {
              videos: [
                .[] | {
                  videoId: .id,
                  title: .title,
                  channel: "Programming with Mosh",
                  thumbnails: {
                    medium: {
                      url: "https://i.ytimg.com/vi/\(.id)/mqdefault.jpg"
                    }
                  }
                }
              ]
            }
          ' raw.json > data/videos.json
          rm raw.json

      - name: حفظ التغييرات
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/videos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث 200 فيديو $(date)"
          git push
