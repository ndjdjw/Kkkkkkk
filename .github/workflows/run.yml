name: جلب فيديوهات يوتيوب (بدون مفتاح)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  fetch-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: إعداد Python وتثبيت الأدوات
        run: |
          sudo apt update
          sudo apt install -y python3-pip
          pip install yt-dlp
          mkdir -p data

      - name: جلب آخر فيديوهات القناة
        run: |
          CHANNEL_URL="https://www.youtube.com/@programmingwithmosh"
          
          # استخدام yt-dlp مع خيارات تجنب الحظر
          yt-dlp \
            --ignore-errors \
            --no-warnings \
            --extractor-args "youtube:player-client=android" \
            --flat-playlist \
            --dump-json \
            --playlist-end 15 \
            "$CHANNEL_URL" 2>/dev/null | jq -s '.' > raw.json

          # إذا فشل السابق، جرب طريقة بديلة
          if [ ! -s raw.json ]; then
            yt-dlp \
              --ignore-errors \
              --no-warnings \
              --extractor-args "youtube:player-client=web" \
              --flat-playlist \
              --dump-json \
              --playlist-end 15 \
              "$CHANNEL_URL" 2>/dev/null | jq -s '.' > raw.json
          fi

          # تحويل البيانات إلى الصيغة المطلوبة
          jq '
            {
              videos: [
                .[] | {
                  videoId: .id,
                  title: .title,
                  channel: "Programming with Mosh",
                  thumbnails: {
                    medium: {
                      url: "https://i.ytimg.com/vi/\(.id)/mqdefault.jpg"
                    }
                  }
                }
              ]
            }
          ' raw.json > data/videos.json

          # تنظيف
          rm -f raw.json

      - name: حفظ التغييرات
        run: |
          COUNT=$(jq '.videos | length' data/videos.json)
          echo "✅ تم جلب $COUNT فيديو"

          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/videos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث الفيديوهات $(date)"
          git push
