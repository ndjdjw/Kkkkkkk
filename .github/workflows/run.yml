name: جلب آلاف الفيديوهات تلقائياً (أقوى حل)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'  # يتحدث كل 12 ساعة

jobs:
  fetch-all-videos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: تثبيت yt-dlp
        run: |
          sudo apt update
          sudo apt install -y python3-pip
          pip install yt-dlp

      - name: جلب فيديوهات لكل الكلمات (5000+ فيديو)
        run: |
          mkdir -p data
          
          # قائمة كلمات البحث الشاملة (كل اللي ضفناها)
          KEYWORDS=(
            # الذكاء الاصطناعي
            "AI tools 2026"
            "ChatGPT tutorial"
            "machine learning"
            "deep learning"
            "generative AI"
            
            # البرمجة
            "Python tutorial"
            "JavaScript course"
            "React js"
            "web development"
            "coding for beginners"
            
            # المال والربح
            "make money online"
            "side hustles"
            "investing for beginners"
            "passive income"
            "crypto explained"
            
            # التسويق
            "digital marketing"
            "SEO tutorial"
            "social media marketing"
            "content marketing"
            "affiliate marketing"
            
            # الصحة واللياقة
            "home workout"
            "weight loss"
            "yoga for beginners"
            "healthy recipes"
            "mental health"
            
            # كلمات عربية
            "جوجل جيميني"
            "الذكاء الاصطناعي"
            "تعلم البرمجة"
            "الربح من الإنترنت"
            "تطوير الذات"
            "سورة البقرة"
            "الرقية الشرعية"
            "تفسير الأحلام"
            "أغاني عربية"
            "فري فاير"
            "ببجي موبايل"
            "الدوري السعودي"
            "مباراة الأهلي"
          )

          # ملف مؤقت
          echo '[]' > temp_all.json

          for KEYWORD in "${KEYWORDS[@]}"; do
            echo "🔍 جلب 20 فيديو عن: $KEYWORD"
            
            # جلب 20 فيديو لكل كلمة (استخدم `ytsearch20`)
            yt-dlp "ytsearch20:$KEYWORD" --dump-json --flat-playlist 2>/dev/null | \
              jq -c '{videoId: .id, title: .title, channel: (.channel // .uploader // "قناة"), thumbnails: {medium: {url: ("https://i.ytimg.com/vi/\(.id)/mqdefault.jpg")}}}' >> temp_all.json
            echo "" >> temp_all.json
          done

          # تنظيف وبناء الملف النهائي
          jq -s '
            {
              videos: [
                .[] | {
                  videoId,
                  title,
                  channel,
                  thumbnails
                }
              ] | unique_by(.videoId)
            }
          ' temp_all.json > data/videos.json

          rm -f temp_all.json

          COUNT=$(jq '.videos | length' data/videos.json)
          echo "✅ تم جلب ${COUNT} فيديو فريد"

      - name: حفظ التغييرات
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/videos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🔥 تحديث ضخم للفيديوهات $(date)"
          git push
