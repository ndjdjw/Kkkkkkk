name: جلب فيديوهات Mosh

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: إنشاء مجلد البيانات
        run: mkdir -p data

      - name: جلب آخر فيديوهات القناة
        run: |
          # رابط RSS الرسمي للقناة
          RSS_URL="https://www.youtube.com/feeds/videos.xml?channel_id=UCWv7vMbMWH4-V0ZXdmDpPBA"
          
          # تحميل RSS
          curl -s "$RSS_URL" > feed.xml
          
          # استخراج العناوين والروابط
          grep -oP '(?<=<title>).*?(?=</title>)' feed.xml | tail -n +2 > titles.txt
          grep -oP '(?<=<yt:videoId>).*?(?=</yt:videoId>)' feed.xml > ids.txt
          
          # بدء ملف JSON
          echo '{"videos": []}' > data/videos.json
          
          # التأكد من وجود نتائج
          if [ -s ids.txt ]; then
            # قراءة كل سطر
            paste ids.txt titles.txt | while read id title; do
              # إضافة الفيديو إلى JSON
              jq --arg id "$id" --arg title "$title" \
                '.videos += [{
                  "videoId": $id,
                  "title": $title,
                  "channel": "Programming with Mosh",
                  "thumbnails": {
                    "medium": {
                      "url": "https://i.ytimg.com/vi/\($id)/mqdefault.jpg"
                    }
                  }
                }]' data/videos.json > temp.json && mv temp.json data/videos.json
            done
            echo "✅ تم جلب $(jq '.videos | length' data/videos.json) فيديو"
          else
            echo "⚠️ لم يتم العثور على فيديوهات، تحقق من القناة"
          fi
          
          # تنظيف
          rm -f feed.xml ids.txt titles.txt

      - name: حفظ التغييرات
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/videos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "تحديث الفيديوهات $(date)"
          git push
