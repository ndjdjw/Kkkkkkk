name: جلب فيديوهات Mosh

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: تثبيت yt-dlp
        run: |
          sudo apt update
          sudo apt install -y yt-dlp jq

      - name: إنشاء مجلد البيانات
        run: mkdir -p data

      - name: جلب آخر 10 فيديوهات من القناة
        run: |
          # استخدام yt-dlp لجلب البيانات
          yt-dlp -j --playlist-end 10 "https://www.youtube.com/@programmingwithmosh" > videos.json

          # تحويل البيانات لصيغة موقعك
          echo '{"videos": []}' > data/videos.json

          # قراءة كل فيديو وبناء JSON
          cat videos.json | while read line; do
            video_id=$(echo $line | jq -r '.id')
            title=$(echo $line | jq -r '.title')
            
            # إضافة للـ JSON
            jq --arg id "$video_id" --arg title "$title" \
               '.videos += [{
                 "videoId": $id,
                 "title": $title,
                 "channel": "Programming with Mosh",
                 "thumbnails": {
                   "medium": {
                     "url": "https://i.ytimg.com/vi/\($id)/mqdefault.jpg"
                   }
                 }
               }]' data/videos.json > temp.json && mv temp.json data/videos.json
          done

          echo "✅ تم جلب $(jq '.videos | length' data/videos.json) فيديو"

      - name: حفظ التغييرات
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add data/videos.json
          git commit -m "تحديث الفيديوهات $(date)" || echo "لا تغييرات"
          git push
