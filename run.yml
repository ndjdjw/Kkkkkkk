name: جلب فيديوهات

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - run: mkdir -p data
      
      - run: curl -s "https://www.youtube.com/feeds/videos.xml?channel_id=UCWv7vMbMWH4-V0ZXdmDpPBA" > feed.xml
      
      - run: |
          echo '{"videos": []}' > data/videos.json
          grep -oP '(?<=<yt:videoId>).*?(?=</yt:videoId>)' feed.xml | while read id; do
            echo "{\"videoId\":\"$id\",\"title\":\"Video $id\",\"channel\":\"Mosh\"}" >> data/videos.json
          done
      
      - run: |
          git add data/videos.json
          git commit -m "update" || exit 0
          git push
