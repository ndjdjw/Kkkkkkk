<script>
    const courses = [
        { title: "الذكاء الاصطناعي التوليدي", instructor: "د. أحمد الزهراني", videoId: "Gv9_4yMHFhI" },
        { title: "الأمن السيبراني للمبتدئين", instructor: "مهندس محمد السبيعي", videoId: "nPJg7GXjN8s" },
        { title: "تحليل البيانات باستخدام بايثون", instructor: "د. نورة العتيبي", videoId: "jBzwzrDvZ18" },
        { title: "التسويق الرقمي المتقدم 2026", instructor: "أ. خالد المطيري", videoId: "VgPJ3Vp3Jk4" }
    ];
    const container = document.getElementById('featured-courses');
    courses.forEach(c => {
        container.innerHTML += `
            <div class="course-card" onclick="window.location.href='course.html?id=${c.videoId}&title=${encodeURIComponent(c.title)}&channel=${encodeURIComponent(c.instructor)}'">
                <div class="course-image" style="background:#e2e8f0;"></div>
                <div class="course-content">
                    <h3>${c.title}</h3>
                    <p>${c.instructor}</p>
                    <a href="javascript:void(0)" class="btn" style="margin-top:15px;">عرض الدورة</a>
                </div>
            </div>
        `;
    });
</script>
