<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة الدورات – أكاديمية زاد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
        body { background:#f8fafc; padding:20px; }
        .header { background:white; padding:20px; border-radius:20px; margin-bottom:30px; display:flex; justify-content:space-between; }
        .logo h2 { color:#10b981; }
        .search-section { background:white; border-radius:30px; padding:40px; text-align:center; margin-bottom:30px; }
        .search-box { display:flex; gap:10px; max-width:600px; margin:20px auto; }
        .search-box input { flex:1; padding:15px; border-radius:50px; border:2px solid #e2e8f0; }
        .search-box button { background:#10b981; color:white; border:none; padding:15px 40px; border-radius:50px; cursor:pointer; }
        .suggestions { background:white; border-radius:20px; padding:20px; margin-bottom:30px; }
        .suggestions-grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
        .chip { background:#f1f5f9; padding:10px 20px; border-radius:50px; cursor:pointer; }
        .chip:hover { background:#10b981; color:white; }
        .results-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
        .video-card { background:white; border-radius:15px; overflow:hidden; box-shadow:0 5px 10px rgba(0,0,0,0.05); }
        .video-thumb { width:100%; height:160px; background:#cbd5e1; }
        .video-info { padding:15px; }
        .watch-btn { display:block; background:#10b981; color:white; text-align:center; padding:10px; border-radius:25px; text-decoration:none; margin-top:10px; }
        .footer { text-align:center; margin-top:40px; color:#64748b; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h2><i class="fas fa-graduation-cap"></i> أكاديمية زاد</h2></div>
        <div><a href="index.html">الرئيسية</a> | <a href="search.html">الدورات</a></div>
    </div>

    <div class="search-section">
        <h1>🔍 ابحث عن دورتك</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="اكتب كلمة البحث...">
            <button onclick="searchVideos()" id="searchBtn">بحث</button>
        </div>
    </div>

    <div class="suggestions" id="suggestionsSection">
        <h3 style="text-align:center; margin-bottom:20px;">اقتراحات البحث الأكثر طلباً</h3>
        <div class="suggestions-grid" id="suggestionsGrid"></div>
    </div>

    <div class="results-grid" id="results">
        <div style="grid-column:1/-1; text-align:center;">ابدأ البحث لترى النتائج</div>
    </div>

    <div class="footer">
        <p>جميع الفيديوهات من قنوات تعليمية موثوقة – محتوى حلال 100%</p>
    </div>

    <script>
        const SUGGESTIONS = [
            "ذكاء اصطناعي", "أمن سيبراني", "بايثون", "تحليل بيانات", "تسويق رقمي",
            "تعلم الآلة", "اختراق أخلاقي", "تطوير تطبيقات", "شبكات", "حوسبة سحابية"
        ];

        let videosData = [];

        function displaySuggestions() {
            const grid = document.getElementById('suggestionsGrid');
            SUGGESTIONS.forEach(word => {
                const chip = document.createElement('div');
                chip.className = 'chip';
                chip.textContent = word;
                chip.onclick = () => {
                    document.getElementById('searchInput').value = word;
                    searchVideos();
                };
                grid.appendChild(chip);
            });
        }

        async function loadVideos() {
            try {
                const res = await fetch('/data/videos.json');
                const data = await res.json();
                videosData = data.videos || [];
            } catch(e) { console.log('لا يوجد ملف فيديوهات بعد'); }
        }

        async function searchVideos() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!query) return;
            document.getElementById('results').innerHTML = '<div style="grid-column:1/-1; text-align:center;">جاري البحث...</div>';
            await loadVideos();
            const filtered = videosData.filter(v => v.title && v.title.toLowerCase().includes(query));
            if (filtered.length > 0) {
                let html = '';
                filtered.slice(0,20).forEach(v => {
                    html += `
                        <div class="video-card">
                            <div class="video-thumb" style="background-image:url(${v.thumbnails?.medium?.url || 'https://via.placeholder.com/320x180'}); background-size:cover;"></div>
                            <div class="video-info">
                                <h4>${v.title}</h4>
                                <p>${v.channel || 'قناة'}</p>
                                <a href="https://youtube.com/watch?v=${v.videoId}" target="_blank" class="watch-btn">مشاهدة</a>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('results').innerHTML = html;
            } else {
                document.getElementById('results').innerHTML = '<div style="grid-column:1/-1; text-align:center;">لا توجد نتائج</div>';
            }
        }

        window.onload = displaySuggestions;
    </script>
</body>
</html>
